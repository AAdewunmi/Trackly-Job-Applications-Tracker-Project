name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "**"
  workflow_dispatch:

jobs:
  test:
    name: Lint, format, and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trackly
          POSTGRES_USER: trackly_user
          POSTGRES_PASSWORD: trackly_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trackly_user -d trackly"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
      POSTGRES_DB: trackly
      POSTGRES_USER: trackly_user
      POSTGRES_PASSWORD: trackly_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Ruff
        run: python -m ruff check .

      - name: Check Black formatting
        run: python -m black . --check

      - name: Check migrations
        run: >
          python manage.py makemigrations
          --check
          --dry-run
          --settings=config.settings.test

      - name: Check production settings
        env:
          DJANGO_SECRET_KEY: ci-production-secret-key-with-enough-length-for-deploy-checks
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: trackly.example.com
          DJANGO_CSRF_TRUSTED_ORIGINS: https://trackly.example.com
        run: python manage.py check --deploy --settings=config.settings.production

      - name: Run tests
        run: >
          python -m pytest
          --ds=config.settings.test
          --cov=apps
          --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5.5.2
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
