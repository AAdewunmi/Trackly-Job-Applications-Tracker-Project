services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000 --settings=config.settings.local
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-local-dev-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      POSTGRES_DB: ${POSTGRES_DB:-trackly}
      POSTGRES_USER: ${POSTGRES_USER:-trackly_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trackly_password}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      NLTK_DATA: ${NLTK_DATA:-/usr/local/share/nltk_data}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trackly}
      POSTGRES_USER: ${POSTGRES_USER:-trackly_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trackly_password}
    ports:
      - "5432:5432"
    volumes:
      - trackly_postgres_data:/var/lib/postgresql/data

volumes:
  trackly_postgres_data:
