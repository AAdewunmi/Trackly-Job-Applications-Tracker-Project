[tool.black]
line-length = 88
target-version = ["py312"]

[tool.ruff]
line-length = 88
target-version = "py312"
src = ["apps", "config"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "DJ"]
ignore = []

[tool.coverage.run]
branch = true
source = ["apps"]

[tool.coverage.report]
fail_under = 95
show_missing = true
