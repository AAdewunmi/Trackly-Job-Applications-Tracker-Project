services:
  - type: web
    name: trackly-web
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: >
      sh -c "python manage.py migrate --noinput
      --settings=config.settings.production
      && python manage.py collectstatic --noinput
      --settings=config.settings.production
      && gunicorn config.wsgi:application
      --bind 0.0.0.0:$PORT"
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: trackly-db
          property: connectionString
      - key: RELEASE_VERSION
        value: render
      - key: LOG_LEVEL
        value: INFO
      - key: DJANGO_LOG_LEVEL
        value: INFO
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "True"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "True"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "31536000"
      - key: DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: DJANGO_SECURE_HSTS_PRELOAD
        value: "True"
      - key: DJANGO_SECURE_CONTENT_TYPE_NOSNIFF
        value: "True"
      - key: DJANGO_X_FRAME_OPTIONS
        value: DENY
      - key: DJANGO_REFERRER_POLICY
        value: same-origin

databases:
  - name: trackly-db
    databaseName: trackly
    user: trackly_user
    plan: starter
